name: Paymap
options:
  bundleIdPrefix: com.csn
  createIntermediateGroups: true
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 10.22.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: 7.0.0
targets:
  Paymap:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Paymap/Sources
      - path: Paymap/Assets.xcassets
      - path: Paymap/GoogleService-Info.plist
    info:
      path: Paymap/Info.plist
      properties:
        CFBundleDisplayName: PayMap
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: AppIcon
        UIApplicationSupportsIndirectInputEvents: true
        NSLocationWhenInUseUsageDescription: "現在地周辺の店舗と決済手段を表示するために位置情報を使用します。"
        NSLocationAlwaysAndWhenInUseUsageDescription: "現在地周辺の店舗と決済手段を表示するために位置情報を使用します。"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        # AdMob: テスト用App ID（本番リリース前に実際のIDに差し替える）
        GADApplicationIdentifier: "ca-app-pub-4490113823639458~5211821465"
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: "cstr6suwn9.skadnetwork"
          - SKAdNetworkIdentifier: "4fzdc2evr5.skadnetwork"
          - SKAdNetworkIdentifier: "4pfyvq9l8r.skadnetwork"
          - SKAdNetworkIdentifier: "2fnua5tdw4.skadnetwork"
          - SKAdNetworkIdentifier: "ydx93a7ass.skadnetwork"
          - SKAdNetworkIdentifier: "ludvb6cn3e.skadnetwork"
          - SKAdNetworkIdentifier: "v9wttpbfk9.skadnetwork"
    settings:
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
      ENABLE_USER_SCRIPT_SANDBOXING: NO
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseFirestoreSwift
      - package: GoogleSignIn
        product: GoogleSignIn
